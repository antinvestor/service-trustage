version: v2
managed:
  enabled: true

plugins:
  - remote: buf.build/protocolbuffers/go
    out: .
    opt:
      - paths=import
      - module=github.com/antinvestor/service-trustage

  - remote: buf.build/connectrpc/go
    out: .
    opt:
      - paths=import
      - module=github.com/antinvestor/service-trustage

  - remote: buf.build/community/sudorandom-connect-openapi
    out: .
    opt:
      - features=connectrpc;gnostic
      - content-types=json
      - allow-get
