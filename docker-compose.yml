services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: trustage
      POSTGRES_PASSWORD: trustage
      POSTGRES_DB: trustage
    volumes:
      - pgdata:/var/lib/postgresql/data

  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--jetstream", "--store_dir=/data", "-m", "8222"]
    volumes:
      - natsdata:/data

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
  natsdata:
