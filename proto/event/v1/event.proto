syntax = "proto3";

package event.v1;

import "common/v1/permissions.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/antinvestor/service-trustage/gen/go/event/v1;eventv1";
option java_multiple_files = true;
option java_package = "eventv1";
option (gnostic.openapi.v3.document) = {
  info: {
    title: "Trustage Event API"
    version: "v1.0.0"
    description: "Event ingestion and workflow timeline reads for the Trustage orchestrator."
  }
};

service EventService {
  option (common.v1.service_permissions) = {
    namespace: "service_trustage"
    permissions: [
      "event_ingest",
      "workflow_view",
      "workflow_manage",
      "instance_view",
      "instance_retry",
      "execution_view",
      "execution_retry",
      "execution_resume",
      "signal_send"
    ]
    role_bindings: [
      {
        role: ROLE_OWNER
        permissions: [
          "event_ingest",
          "workflow_view",
          "workflow_manage",
          "instance_view",
          "instance_retry",
          "execution_view",
          "execution_retry",
          "execution_resume",
          "signal_send"
        ]
      },
      {
        role: ROLE_ADMIN
        permissions: [
          "event_ingest",
          "workflow_view",
          "workflow_manage",
          "instance_view",
          "instance_retry",
          "execution_view",
          "execution_retry",
          "execution_resume",
          "signal_send"
        ]
      },
      {
        role: ROLE_OPERATOR
        permissions: [
          "event_ingest",
          "workflow_view",
          "instance_view",
          "execution_view",
          "signal_send"
        ]
      },
      {
        role: ROLE_VIEWER
        permissions: [
          "workflow_view",
          "instance_view",
          "execution_view"
        ]
      },
      {
        role: ROLE_MEMBER
        permissions: [
          "workflow_view",
          "instance_view",
          "execution_view"
        ]
      },
      {
        role: ROLE_SERVICE
        permissions: [
          "event_ingest",
          "workflow_view",
          "workflow_manage",
          "instance_view",
          "instance_retry",
          "execution_view",
          "execution_retry",
          "execution_resume",
          "signal_send"
        ]
      }
    ]
  };

  rpc IngestEvent(IngestEventRequest) returns (IngestEventResponse) {
    option (common.v1.method_permissions) = {
      permissions: ["event_ingest"]
    };
  }
  rpc GetInstanceTimeline(GetInstanceTimelineRequest) returns (GetInstanceTimelineResponse) {
    option (common.v1.method_permissions) = {
      permissions: ["instance_view"]
    };
  }
}

message EventRecord {
  string event_id = 1;
  string event_type = 2;
  string source = 3;
  string idempotency_key = 4;
  google.protobuf.Struct payload = 5;
}

message IngestEventRequest {
  string event_type = 1;
  string source = 2;
  string idempotency_key = 3;
  google.protobuf.Struct payload = 4;
}

message IngestEventResponse {
  EventRecord event = 1;
  bool idempotent = 2;
}

message GetInstanceTimelineRequest {
  string instance_id = 1;
}

message TimelineEntry {
  string event_type = 1;
  string state = 2;
  string from_state = 3;
  string to_state = 4;
  string execution_id = 5;
  string trace_id = 6;
  google.protobuf.Struct payload = 7;
  google.protobuf.Timestamp created_at = 8;
}

message GetInstanceTimelineResponse {
  repeated TimelineEntry items = 1;
}
