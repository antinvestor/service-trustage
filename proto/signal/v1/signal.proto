syntax = "proto3";

package signal.v1;

import "common/v1/permissions.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/protobuf/struct.proto";

option go_package = "github.com/antinvestor/service-trustage/gen/go/signal/v1;signalv1";
option java_multiple_files = true;
option java_package = "signalv1";
option (gnostic.openapi.v3.document) = {
  info: {
    title: "Trustage Signal API"
    version: "v1.0.0"
    description: "Workflow signal delivery for resuming waiting Trustage executions."
  }
};

service SignalService {
  option (common.v1.service_permissions) = {
    namespace: "service_trustage"
    permissions: [
      "event_ingest",
      "workflow_view",
      "workflow_manage",
      "instance_view",
      "instance_retry",
      "execution_view",
      "execution_retry",
      "execution_resume",
      "signal_send"
    ]
    role_bindings: [
      {
        role: ROLE_OWNER
        permissions: [
          "event_ingest",
          "workflow_view",
          "workflow_manage",
          "instance_view",
          "instance_retry",
          "execution_view",
          "execution_retry",
          "execution_resume",
          "signal_send"
        ]
      },
      {
        role: ROLE_ADMIN
        permissions: [
          "event_ingest",
          "workflow_view",
          "workflow_manage",
          "instance_view",
          "instance_retry",
          "execution_view",
          "execution_retry",
          "execution_resume",
          "signal_send"
        ]
      },
      {
        role: ROLE_OPERATOR
        permissions: [
          "event_ingest",
          "workflow_view",
          "instance_view",
          "execution_view",
          "signal_send"
        ]
      },
      {
        role: ROLE_VIEWER
        permissions: [
          "workflow_view",
          "instance_view",
          "execution_view"
        ]
      },
      {
        role: ROLE_MEMBER
        permissions: [
          "workflow_view",
          "instance_view",
          "execution_view"
        ]
      },
      {
        role: ROLE_SERVICE
        permissions: [
          "event_ingest",
          "workflow_view",
          "workflow_manage",
          "instance_view",
          "instance_retry",
          "execution_view",
          "execution_retry",
          "execution_resume",
          "signal_send"
        ]
      }
    ]
  };

  rpc SendSignal(SendSignalRequest) returns (SendSignalResponse) {
    option (common.v1.method_permissions) = {
      permissions: ["signal_send"]
    };
  }
}

message SendSignalRequest {
  string instance_id = 1;
  string signal_name = 2;
  google.protobuf.Struct payload = 3;
}

message SendSignalResponse {
  bool delivered = 1;
}
