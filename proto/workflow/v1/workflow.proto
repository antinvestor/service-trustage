syntax = "proto3";

package workflow.v1;

import "common/v1/common.proto";
import "common/v1/permissions.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/antinvestor/service-trustage/gen/go/workflow/v1;workflowv1";
option java_multiple_files = true;
option java_package = "workflowv1";
option (gnostic.openapi.v3.document) = {
  info: {
    title: "Trustage Workflow API"
    version: "v1.0.0"
    description: "Workflow definition management for the Trustage orchestrator."
  }
};

service WorkflowService {
  option (common.v1.service_permissions) = {
    namespace: "service_trustage"
    permissions: [
      "event_ingest",
      "workflow_view",
      "workflow_manage",
      "instance_view",
      "instance_retry",
      "execution_view",
      "execution_retry",
      "execution_resume",
      "signal_send"
    ]
    role_bindings: [
      {
        role: ROLE_OWNER
        permissions: [
          "event_ingest",
          "workflow_view",
          "workflow_manage",
          "instance_view",
          "instance_retry",
          "execution_view",
          "execution_retry",
          "execution_resume",
          "signal_send"
        ]
      },
      {
        role: ROLE_ADMIN
        permissions: [
          "event_ingest",
          "workflow_view",
          "workflow_manage",
          "instance_view",
          "instance_retry",
          "execution_view",
          "execution_retry",
          "execution_resume",
          "signal_send"
        ]
      },
      {
        role: ROLE_OPERATOR
        permissions: [
          "event_ingest",
          "workflow_view",
          "instance_view",
          "execution_view",
          "signal_send"
        ]
      },
      {
        role: ROLE_VIEWER
        permissions: [
          "workflow_view",
          "instance_view",
          "execution_view"
        ]
      },
      {
        role: ROLE_MEMBER
        permissions: [
          "workflow_view",
          "instance_view",
          "execution_view"
        ]
      },
      {
        role: ROLE_SERVICE
        permissions: [
          "event_ingest",
          "workflow_view",
          "workflow_manage",
          "instance_view",
          "instance_retry",
          "execution_view",
          "execution_retry",
          "execution_resume",
          "signal_send"
        ]
      }
    ]
  };

  rpc CreateWorkflow(CreateWorkflowRequest) returns (CreateWorkflowResponse) {
    option (common.v1.method_permissions) = {
      permissions: ["workflow_manage"]
    };
  }
  rpc GetWorkflow(GetWorkflowRequest) returns (GetWorkflowResponse) {
    option (common.v1.method_permissions) = {
      permissions: ["workflow_view"]
    };
  }
  rpc ListWorkflows(ListWorkflowsRequest) returns (ListWorkflowsResponse) {
    option (common.v1.method_permissions) = {
      permissions: ["workflow_view"]
    };
  }
  rpc ActivateWorkflow(ActivateWorkflowRequest) returns (ActivateWorkflowResponse) {
    option (common.v1.method_permissions) = {
      permissions: ["workflow_manage"]
    };
  }
}

enum WorkflowStatus {
  WORKFLOW_STATUS_UNSPECIFIED = 0;
  WORKFLOW_STATUS_DRAFT = 1;
  WORKFLOW_STATUS_ACTIVE = 2;
  WORKFLOW_STATUS_ARCHIVED = 3;
}

message WorkflowDefinition {
  string id = 1;
  string name = 2;
  int32 version = 3;
  WorkflowStatus status = 4;
  google.protobuf.Struct dsl = 5;
  string input_schema_hash = 6;
  int64 timeout_seconds = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message CreateWorkflowRequest {
  google.protobuf.Struct dsl = 1;
}

message CreateWorkflowResponse {
  WorkflowDefinition workflow = 1;
}

message ScheduleDefinition {
  string id = 1;
  string name = 2;
  string cron_expr = 3;
  string workflow_name = 4;
  int32 workflow_version = 5;
  bool active = 6;
  google.protobuf.Timestamp next_fire_at = 7;
  google.protobuf.Timestamp last_fired_at = 8;
  int32 jitter_seconds = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message GetWorkflowRequest {
  string id = 1;
}

message GetWorkflowResponse {
  WorkflowDefinition workflow = 1;
  repeated ScheduleDefinition schedules = 2;
}

message ListWorkflowsRequest {
  string name = 1;
  WorkflowStatus status = 2;
  common.v1.SearchRequest search = 3;
}

message ListWorkflowsResponse {
  repeated WorkflowDefinition items = 1;
  common.v1.PageCursor next_cursor = 2;
}

message ActivateWorkflowRequest {
  string id = 1;
}

message ActivateWorkflowResponse {
  WorkflowDefinition workflow = 1;
}
