# Per-module dart codegen for event.
version: v2
managed:
  enabled: true

plugins:
  - remote: buf.build/protocolbuffers/dart:v21.1.2
    out: ../sdk/dart/event/lib/src
    include_imports: true
    include_wkt: true

  - remote: buf.build/connectrpc/dart
    out: ../sdk/dart/event/lib/src
    include_imports: true
    include_wkt: true
