version: v2
managed:
  enabled: true

plugins:
  # OpenAPI spec generation
  - remote: buf.build/community/sudorandom-connect-openapi
    out: ../apps/default
    opt:
      - features=connectrpc;gnostic;protovalidate
      - content-types=json
      - allow-get

  # Dart protobuf generation - one output per module
  - remote: buf.build/protocolbuffers/dart:v21.1.2
    out: ../sdk/dart/event/lib/src
    include_imports: true
    include_wkt: true

  - remote: buf.build/connectrpc/dart
    out: ../sdk/dart/event/lib/src
    include_imports: true
    include_wkt: true

  - remote: buf.build/protocolbuffers/dart:v21.1.2
    out: ../sdk/dart/runtime/lib/src
    include_imports: true
    include_wkt: true

  - remote: buf.build/connectrpc/dart
    out: ../sdk/dart/runtime/lib/src
    include_imports: true
    include_wkt: true

  - remote: buf.build/protocolbuffers/dart:v21.1.2
    out: ../sdk/dart/signal/lib/src
    include_imports: true
    include_wkt: true

  - remote: buf.build/connectrpc/dart
    out: ../sdk/dart/signal/lib/src
    include_imports: true
    include_wkt: true

  - remote: buf.build/protocolbuffers/dart:v21.1.2
    out: ../sdk/dart/workflow/lib/src
    include_imports: true
    include_wkt: true

  - remote: buf.build/connectrpc/dart
    out: ../sdk/dart/workflow/lib/src
    include_imports: true
    include_wkt: true
