version: v2
managed:
  enabled: true

plugins:
  # OpenAPI spec generation (per-module via paths=source_relative)
  - remote: buf.build/community/sudorandom-connect-openapi
    out: ../apps/default
    opt:
      - features=connectrpc;gnostic;protovalidate
      - content-types=json
      - allow-get

# Dart codegen lives in per-module buf.gen.dart.<module>.yaml so each
# dart package contains only its own module's protos.
